        body {

<footer class="glass-panel h-64 rounded-2xl p-4 flex flex-col relative">

<iconify-icon class="text-indigo-400 text-lg" icon="solar:graph-bold-duotone"></iconify-icon>
<h3 class="text-xs font-bold text-white tracking-widest uppercase">Temporal Queue Dynamics (时序队列动力学)</h3>
</div>
<div class="flex items-center space-x-4">
<div class="flex items-center space-x-1">
<span class="w-2 h-2 rounded-full bg-cyan-400"></span>

</div>

</div>

<script>
        // --- 核心状态与仿真逻辑 ---
        const CONFIG = {
            flowRate: 0.5,
            windowCount: 6,
            patience: 120,
            canvasWidth: 0,
            canvasHeight: 0,
            studentRadius: 5,
            windowSize: { w: 60, h: 40 },
            entranceX: 50,
            simRunning: false
        };

        let students = [];
        let windows = [];
        let timeSteps = 0;
        let chartData = { time: [], queueSize: [], activeWindows: [] };
        let metrics = { totalJoined: 0, totalLeaved: 0, totalWaitTime: 0, lostCount: 0 };

        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        let chart;

        // 初始化窗口
        function initWindows() {
            windows = [];
            const margin = 40;
            const availableWidth = CONFIG.canvasWidth - 200;
            const spacing = availableWidth / (CONFIG.windowCount - 1);
            
            for (let i = 0; i < CONFIG.windowCount; i++) {
                windows.push({
                    id: i,
                    x: 150 + i * spacing,
                    y: 80,
                    queue: [],
                    isServing: false,
                    workload: 0, // 0-100
                    processingTime: 0
                });
            }
        }

        // 窗口绘制
        function drawWindows() {
            windows.forEach(win => {
                const isOverloaded = win.queue.length > 5;
                // 窗口主体
                ctx.fillStyle = isOverloaded ? 'rgba(244, 63, 94, 0.2)' : 'rgba(16, 185, 129, 0.2)';
                ctx.strokeStyle = isOverloaded ? '#f43f5e' : '#10b981';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(win.x - CONFIG.windowSize.w/2, win.y - CONFIG.windowSize.h/2, CONFIG.windowSize.w, CONFIG.windowSize.h, 8);
                ctx.fill();
                ctx.stroke();

                // 窗口阴影
                if (isOverloaded) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#f43f5e';
                }

                // 计数
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Mono';
                ctx.textAlign = 'center';
                ctx.fillText(`W-${win.id+1}`, win.x, win.y - 5);
                ctx.font = '10px Mono';
                ctx.fillStyle = isOverloaded ? '#fda4af' : '#6ee7b7';
                ctx.fillText(`Q: ${win.queue.length}`, win.x, win.y + 12);
                
                ctx.shadowBlur = 0;
            });
        }

        // 学生类
        class Student {
            constructor() {
                this.x = CONFIG.entranceX;
                this.y = CONFIG.canvasHeight - 50;
                this.targetWindowId = -1;
                this.status = 'walking'; // walking, queuing, served, abandoned
                this.patience = CONFIG.patience * (0.8 + Math.random() * 0.4);
                this.waitTime = 0;
                this.color = '#22d3ee';
                this.size = CONFIG.studentRadius;
                this.speed = 2 + Math.random() * 2;
                this.posInQueue = 0;
            }

            update() {
                if (this.status === 'walking') {
                    // 找到最短队列
                    if (this.targetWindowId === -1) {
                        let minLen = Infinity;
                        windows.forEach(w => {
                            if (w.queue.length < minLen) {
                                minLen = w.queue.length;
                                this.targetWindowId = w.id;
                            }
                        });
                        windows[this.targetWindowId].queue.push(this);
                        this.posInQueue = windows[this.targetWindowId].queue.indexOf(this);
                    }

                    const targetWin = windows[this.targetWindowId];
                    const targetX = targetWin.x;
                    const targetY = targetWin.y + 60 + (this.posInQueue * 15);

                    // 移动到目标位置
                    const dx = targetX - this.x;
                    const dy = targetY - this.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist > 5) {
                        this.x += (dx / dist) * this.speed;
                        this.y += (dy / dist) * this.speed;
                    } else {
                        this.status = 'queuing';
                    }
                } else if (this.status === 'queuing') {
                    const targetWin = windows[this.targetWindowId];
                    this.posInQueue = targetWin.queue.indexOf(this);
                    
                    // 自动跟进队列
                    const targetY = targetWin.y + 60 + (this.posInQueue * 15);
                    this.y += (targetY - this.y) * 0.1;
                    this.x += (targetWin.x - this.x) * 0.1;

                    this.waitTime++;
                    if (this.waitTime > this.patience) {
                        this.status = 'abandoned';
                        targetWin.queue.splice(this.posInQueue, 1);
                        metrics.lostCount++;
                    }
                    
                    // 渐变报警色
                    if (this.waitTime > this.patience * 0.7) {
                        this.color = '#fbbf24';
                    }
                    if (this.waitTime > this.patience * 0.9) {
                        this.color = '#f87171';
                    }
                }
            }

            draw() {
                if (this.status === 'abandoned') return;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                if (this.status === 'queuing' && this.posInQueue === 0) {
                   ctx.strokeStyle = '#fff';
                   ctx.lineWidth = 1;
                   ctx.stroke();
                }
            }
        }

        // 执行仿真步
        function step() {
            if (!CONFIG.simRunning) return;

            // 生成新学生
            if (Math.random() < CONFIG.flowRate) {
                students.push(new Student());
                metrics.totalJoined++;
            }

            // 更新窗口服务
            windows.forEach(win => {
                if (win.queue.length > 0) {
                    win.processingTime++;
                    // 假设服务一个学生耗时 30-80 帧
                    const serviceThreshold = 50 + Math.random() * 30;
                    if (win.processingTime > serviceThreshold) {
                        const served = win.queue.shift();
                        metrics.totalLeaved++;
                        metrics.totalWaitTime += served.waitTime;
                        win.processingTime = 0;
                        // 移除该学生实例
                        students = students.filter(s => s !== served);
                    }
                }
            });

            // 更新学生
            students.forEach(s => s.update());
            students = students.filter(s => s.status !== 'abandoned');

            timeSteps++;
            if (timeSteps % 60 === 0) updateStats();
            
            draw();
            requestAnimationFrame(step);
        }

        function draw() {
            ctx.clearRect(0, 0, CONFIG.canvasWidth, CONFIG.canvasHeight);
            
            // 绘制背景格栅
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for(let i=0; i<CONFIG.canvasWidth; i+=40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, CONFIG.canvasHeight); ctx.stroke();
            }
            for(let i=0; i<CONFIG.canvasHeight; i+=40) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(CONFIG.canvasWidth, i); ctx.stroke();
            }

            drawWindows();
            students.forEach(s => s.draw());
        }

        function updateStats() {
            const currentQ = students.length;
            const avgWait = metrics.totalLeaved > 0 ? (metrics.totalWaitTime / metrics.totalLeaved / 60).toFixed(1) : 0;
            const lossRate = metrics.totalJoined > 0 ? ((metrics.lostCount / metrics.totalJoined) * 100).toFixed(1) : 0;
            const util = (windows.filter(w => w.queue.length > 0).length / windows.length * 100).toFixed(1);
            
            document.getElementById('currentWaiters').textContent = currentQ;
            document.getElementById('totalStudents').textContent = metrics.totalJoined;
            document.getElementById('avgWaitTime').textContent = avgWait;
            document.getElementById('abandonRate').textContent = lossRate;
            document.getElementById('resourceUtil').textContent = util;

            const load = Math.min(100, (currentQ / (CONFIG.windowCount * 5)) * 100);
            document.getElementById('loadPercent').textContent = Math.round(load) + '%';
            document.getElementById('loadBar').style.width = load + '%';
            
            const advice = document.getElementById('systemAdvice');
            if(load > 80) {
                advice.innerHTML = "⚠️ <b>高负载警报</b>：排队人数过多，建议立即加开 2-3 个服务窗口。";
                advice.parentElement.classList.replace('bg-cyan-500/5', 'bg-rose-500/10');
            } else if (lossRate > 10) {
                advice.innerHTML = "💡 <b>效率偏低</b>：学生流失率较高，尝试提高服务人员响应速度。";
                advice.parentElement.classList.replace('bg-cyan-500/5', 'bg-amber-500/10');
            } else {
                advice.innerHTML = "✅ <b>系统平稳</b>：当前资源配置可以满足用餐需求。";
                advice.parentElement.className = "p-3 bg-cyan-500/5 rounded-xl border border-cyan-500/10";
            }

            // 更新图表
            const now = new Date().toLocaleTimeString();
            chartData.time.push(now);
            chartData.queueSize.push(currentQ);
            chartData.activeWindows.push(CONFIG.windowCount);
            if (chartData.time.length > 30) {
                chartData.time.shift();
                chartData.queueSize.shift();
                chartData.activeWindows.shift();
            }
            chart.setOption({
                xAxis: { data: chartData.time },
                series: [
                    { data: chartData.queueSize },
                    { data: chartData.activeWindows }
                ]
            });
        }

        // --- 初始化控制 ---
        function handleResize() {
            const container = document.getElementById('canvasContainer');
            CONFIG.canvasWidth = container.clientWidth;
            CONFIG.canvasHeight = container.clientHeight;
            canvas.width = CONFIG.canvasWidth;
            canvas.height = CONFIG.canvasHeight;
            initWindows();
            draw();
        }

        function initChart() {
            chart = echarts.init(document.getElementById('historyChart'));
            const option = {
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis', backgroundColor: '#0f172a', borderColor: '#1e293b', textStyle: { color: '#fff' } },
                grid: { top: 20, left: 40, right: 40, bottom: 20 },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: [],
                    axisLine: { lineStyle: { color: '#334155' } },
                    axisLabel: { color: '#64748b', fontSize: 10 }
                },
                yAxis: [
                    { type: 'value', name: '人数', splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } }, axisLabel: { color: '#64748b' } },
                    { type: 'value', name: '窗口', position: 'right', max: 15, splitLine: { show: false }, axisLabel: { color: '#64748b' } }
                ],
                series: [
                    {
                        name: '排队总人数',
                        type: 'line',
                        smooth: true,
                        showSymbol: false,
                        areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: 'rgba(34, 211, 238, 0.3)'}, {offset: 1, color: 'transparent'}]) },
                        lineStyle: { width: 3, color: '#22d3ee' },
                        data: []
                    },
                    {
                        name: '开启窗口数',
                        type: 'line',
                        yAxisIndex: 1,
                        step: 'start',
                        lineStyle: { width: 2, color: '#f43f5e', type: 'dashed' },
                        data: []
                    }
                ]
            };
            chart.setOption(option);
        }

        // 事件监听
        document.getElementById('flowRate').oninput = e => {
            CONFIG.flowRate = parseFloat(e.target.value);
            document.getElementById('flowRateVal').textContent = CONFIG.flowRate;
        };
        document.getElementById('windowCount').oninput = e => {
            CONFIG.windowCount = parseInt(e.target.value);
            document.getElementById('windowCountVal').textContent = CONFIG.windowCount;
            initWindows(); // 重建窗口
        };
        document.getElementById('patience').oninput = e => {
            CONFIG.patience = parseInt(e.target.value);
            document.getElementById('patienceVal').textContent = CONFIG.patience + 's';
        };

        document.getElementById('startBtn').onclick = () => { CONFIG.simRunning = true; step(); };
        document.getElementById('pauseBtn').onclick = () => { CONFIG.simRunning = false; };
        document.getElementById('resetBtn').onclick = () => { location.reload(); };
        document.getElementById('stressBtn').onclick = () => {
            CONFIG.flowRate = 2.0;
            CONFIG.patience = 60;
            document.getElementById('flowRate').value = 2.0;
            document.getElementById('patience').value = 60;
            document.getElementById('flowRateVal').textContent = '2.0';
            document.getElementById('patienceVal').textContent = '60s';
            CONFIG.simRunning = true;
            step();
        };

        window.onload = () => {
            handleResize();
            initChart();
            window.addEventListener('resize', () => { handleResize(); chart.resize(); });
            draw();
        };
    </script>
</body>
</html>
